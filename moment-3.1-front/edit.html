<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/src/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Quicksand">
  <script src="src/edit.js"></script>
  <title>Ändra post</title>
</head>

<body>
  <header>
    <ul id="nav">
      <li>
        <a href="index.html">Tillbaka</a>
      </li>

    </ul>
  </header>
  <section id="main">
    <h1>Ändra post</h1>
    <ul id="errorList">

    </ul>
    <form id="form" method="post">
      <label for="company">Företag:</label>
      <input type="text" name="company" id="company" autocomplete="on">
      <label for="jobtitle">Befattningsroll:</label>
      <input type="text" name="jobtitle" id="jobtitle" placeholder="Kommunikationansvarig...">
      <label for="joblocation">Ort:</label>
      <input type="text" name="joblocation" id="joblocation">
      <label for="workfromwhere">Arbetsform:</label>
      <select name="workfromwhere" id="workfromwhere">
        <option value="Platsarbete">På plats</option>
        <option value="Distansarbete">Distans</option>
        <option value="Plats- och distans">Varierande</option>
      </select>
      <label for="workinghours">Anställningsgrad (%):</label>
      <input type="text" name="workinghours" id="workinghours" placeholder="25%, 75% etc">
      <label for="description">Rollbeskrivning:</label>
      <textarea id="description" name="description" placeholder="Planerade och stod för nyheter inom organisationen och för PR"></textarea>
      <input type="submit" id="sendUpdate" value="Skicka till CV">
    </form>
  </section>
</body>

</html>
