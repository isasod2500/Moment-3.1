<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/src/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Quicksand">
  <script src="src/edit.js"></script>
  <title>Ändra post</title>
</head>

<body>
  <header>
    <ul id="nav">
      <li>
        <a href="index.html">Tillbaka</a>
      </li>

    </ul>
  </header>
  <section id="main">
    <h1>Ändra post</h1>
    <ul id="errorList">

    </ul>
    <form id="form" method="post">
      <label for="companyname">Företag:</label>
      <input type="text" name="companyname" id="companyname">
      <label for="jobtitle">Befattningsroll:</label>
      <input type="text" name="jobtitle" id="jobtitle" placeholder="IT-support...">
      <label for="jobLocation">Ort:</label>
      <input type="text" name="jobLocation" id="jobLocation">
      <label for="startdate">Startdatum:</label>
      <input type="date" id="startdate" name="startdate">
      <label for="enddate">Slutdatum:</label>
      <input type="date" id="enddate" name="enddate">
      <label for="description">Rollbeskrivning:</label>
      <textarea id="description" name="description" placeholder="Supporterade slutanvändare på kontor och ute i fält med mjukvaru- och hårdvaruproblem"></textarea>
      <input type="submit" id="sendUpdate" value="Skicka till CV">
    </form>
  </section>
</body>

</html>
